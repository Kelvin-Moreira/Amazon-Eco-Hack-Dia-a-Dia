<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dia a Dia IA - Assistente</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --fs: 19px;
      --ink: #2B2620;
      --ink-soft: #635B4E;
      --paper: #FBF6EC;
      --paper-raised: #FFFFFF;
      --line: #E8E0D0;
      --forest: #2F6B4F;
      --forest-dark: #204B38;
      --forest-tint: #E4F0E9;
      --river: #2C6E8C;
      --alert: #B3401F;
      --alert-tint: #FBE7E0;
      --radius-md: 16px;
      --shadow: 0 4px 18px rgba(43,38,32,0.08);
    }
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    .font-display { font-family: 'Fraunces', serif; }
    body { font-size: var(--fs); background: var(--paper); color: var(--ink); margin: 0; height: 100vh; display: flex; flex-direction: column; }

    header.app-header {
      background: linear-gradient(135deg, var(--forest) 0%, var(--forest-dark) 100%);
      padding: 20px;
      color: #fff;
    }
    
    .chat-msg { max-width: 85%; padding: 13px 17px; border-radius: 18px; margin-bottom: 10px; font-size: 0.95em; line-height: 1.55; }
    .chat-user { background: var(--forest); color: white; margin-left: auto; border-bottom-right-radius: 5px; }
    .chat-bot { background: var(--paper-raised); color: var(--ink); border: 1px solid var(--line); border-bottom-left-radius: 5px; box-shadow: var(--shadow); }

    input {
      font-size: 1em; padding: 15px; border: 2px solid var(--line); border-radius: 14px; width: 100%;
      background: var(--paper-raised); color: var(--ink);
    }
    input:focus { outline: none; border-color: var(--forest); box-shadow: 0 0 0 4px var(--forest-tint); }

    .big-btn {
      min-height: 52px; font-size: 1em; font-weight: 700; border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px;
      cursor: pointer; border: none; transition: transform 0.12s;
    }
    .big-btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--forest); color: #fff; box-shadow: 0 3px 10px rgba(47,107,79,0.28); }

    .fab {
      position: fixed; bottom: 95px; width: 60px; height: 60px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; box-shadow: 0 6px 16px rgba(0,0,0,0.22); cursor: pointer; border: 3px solid var(--paper); z-index: 50;
    }
    .fab-mic { right: 20px; background: var(--forest); color: white; }
    .fab-speak { left: 20px; background: var(--river); color: white; }
    .fab-mic.recording { background: var(--alert); animation: pulse 1.1s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(179,64,31,0.45)} 50%{box-shadow:0 0 0 14px rgba(179,64,31,0)} }
  </style>
</head>
<body>

  <!-- CABEÇALHO DO ASSISTENTE -->
  <header class="app-header flex items-center gap-3">
    <div class="w-11 h-11 rounded-full flex items-center justify-center" style="background:rgba(255,255,255,0.18);">
      <i data-lucide="bot" style="width:24px;height:24px;color:#fff;"></i>
    </div>
    <div>
      <h1 class="font-display" style="font-size:1.3em; font-weight:600;">Dia a Dia IA</h1>
      <p style="font-size:0.85em; opacity:0.85;">Seu assistente de saúde inteligente</p>
    </div>
  </header>

  <!-- ÁREA DE MENSAGENS -->
  <div class="flex-1 overflow-y-auto p-4 space-y-3" id="chat-area">
    <div class="chat-msg chat-bot">Olá, Sr. Raimundo! Sou sua assistente de saúde. Estou acompanhando seus cuidados com o diabetes por aqui. Como posso ajudar o senhor hoje?</div>
  </div>

  <!-- BOTÕES FLUTUANTES (VOZ E SILENCIAR) -->
  <button class="fab fab-speak" id="fab-speak" onclick="toggleSpeak()" aria-label="Silenciar ou falar">🔊</button>
  <button class="fab fab-mic" id="fab-mic" onclick="iniciarMic()" aria-label="Microfone">🎤</button>

  <!-- CAMPO DE DIGITAÇÃO E CONTROLES -->
  <form onsubmit="event.preventDefault();enviarChat();" class="p-3 flex flex-col gap-2" style="background:var(--paper-raised); border-top:1px solid var(--line);">
    <div class="flex gap-2 w-full">
      <input id="chat-input" type="text" placeholder="Digite sua dúvida ou sintoma...">
      <button type="submit" class="big-btn btn-primary px-6">Enviar</button>
    </div>
  </form>

  <!-- NOTIFICAÇÃO TOAST -->
  <div id="toast" class="fixed top-4 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-xl shadow-lg text-sm font-semibold z-[200] transition-all opacity-0 pointer-events-none" style="background:var(--forest);"></div>

  <!-- IMPORTAÇÃO DO CLIENTE GEMMA -->
  <script src="gemma_client.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if(window.lucide) lucide.createIcons();
    });

    const chatArea = document.getElementById('chat-area');
    let aguardandoResposta = false;

    async function enviarChat(textoOpcional) {
      const input = document.getElementById('chat-input');
      const msg = textoOpcional || input.value.trim();
      if (!msg) return;
      
      if (aguardandoResposta) {
        toast('Aguarde a resposta anterior...');
        return;
      }
      
      if (!textoOpcional) input.value = '';
      addChatMsg(msg, true);

      aguardandoResposta = true;
      const pensandoEl = addChatMsg('O assistente está pensando...', false, true);

      try {
        // Chamada direta e correta para a função do gemma_client.js
        const resp = await sendToGemma(msg);
        pensandoEl.remove();
        addChatMsg(resp, false);
        speak(resp);
      } catch (e) {
        pensandoEl.remove();
        addChatMsg('Desculpe, não consegui responder agora. Verifique se o terminal Python está rodando.', false);
        console.error(e);
      } finally {
        aguardandoResposta = false;
      }
    }

    function addChatMsg(text, isUser, temporario) {
      const div = document.createElement('div');
      div.className = 'chat-msg ' + (isUser ? 'chat-user' : 'chat-bot');
      if (temporario) div.style.opacity = '0.6';
      div.textContent = text;
      chatArea.appendChild(div);
      chatArea.scrollTop = chatArea.scrollHeight;
      return div;
    }

    // ===== SÍNTESE DE VOZ E SILENCIAMENTO =====
    let isSpeaking = false;

    function speak(text) {
      if(!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'pt-BR';
      u.rate = 0.9;
      
      u.onstart = () => { isSpeaking = true; updateSpeakButton(); };
      u.onend = () => { isSpeaking = false; updateSpeakButton(); };
      u.onerror = () => { isSpeaking = false; updateSpeakButton(); };

      window.speechSynthesis.speak(u);
    }

    function stopSpeak() {
      if(window.speechSynthesis) window.speechSynthesis.cancel();
      isSpeaking = false;
      updateSpeakButton();
    }

    function toggleSpeak() {
      if (isSpeaking) {
        stopSpeak();
        toast('Áudio silenciado.');
      } else {
        const botMsgs = document.querySelectorAll('.chat-bot');
        const ultima = botMsgs[botMsgs.length - 1];
        if (ultima) speak(ultima.textContent);
        else toast('Nenhuma mensagem para ler.');
      }
    }

    function updateSpeakButton() {
      const btn = document.getElementById('fab-speak');
      if(btn) btn.innerHTML = isSpeaking ? '🔊' : '🔇';
    }

    // ===== RECONHECIMENTO DE VOZ (MICROFONE) =====
    let recognition = null;
    let isRecording = false;

    function iniciarMic() {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRec) {
        toast('Voz não suportada neste navegador.');
        return;
      }
      if (isRecording) {
        pararMic();
        return;
      }
      try {
        recognition = new SpeechRec();
        recognition.lang = 'pt-BR';
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => {
          isRecording = true;
          const fab = document.getElementById('fab-mic');
          fab.classList.add('recording');
          fab.innerHTML = '🛑';
          toast('Ouvindo...');
        };

        recognition.onresult = (e) => {
          const transcript = e.results[0][0].transcript;
          if (transcript) enviarChat(transcript);
        };

        recognition.onerror = () => { pararMic(); toast('Não entendi.'); };
        recognition.onend = () => { pararMic(); };

        recognition.start();
      } catch (e) {
        pararMic();
      }
    }

    function pararMic() {
      if (recognition) { try { recognition.stop(); } catch(err) {} }
      isRecording = false;
      const fab = document.getElementById('fab-mic');
      if(fab) {
        fab.classList.remove('recording');
        fab.innerHTML = '🎤';
      }
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.opacity = '1';
      setTimeout(() => { el.style.opacity = '0'; }, 2500);
    }
  </script>
</body>
</html>
